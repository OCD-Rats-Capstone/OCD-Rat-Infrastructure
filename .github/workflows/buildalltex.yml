name: buildtex-all
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile-latex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find all LaTeX files
        id: latex-files
        run: |
          CHANGED_FILES=$(find docs -name "*.tex" | xargs)
          echo "All .tex files: $CHANGED_FILES"
          echo "CHANGED_FILES=$CHANGED_FILES" >> $GITHUB_ENV
          CHANGED_FILENAMES=$(for file in $CHANGED_FILES; do basename "$file"; done | xargs)
          echo "CHANGED_FILENAMES=$CHANGED_FILENAMES" >> $GITHUB_ENV

      - uses: xu-cheng/texlive-action@v2
        name: Compile all LaTeX Files
        with:
          scheme: full
          texlive_version: 2024
          run: |
            apk add make
            cd docs
            FAILED=0
            for file in ${{ env.CHANGED_FILES }}; do
              dir=$(dirname "$file" | cut -d'/' -f2-)
              base=$(basename "$file" .tex)
              echo "Compiling $dir/$base.tex..."
              make -B "$dir/$base.pdf" || {
                echo "======= ERROR in $dir/$base.tex ======="
                grep -A 5 "^!" "$dir/$base.log" || cat "$dir/$base.log"
                FAILED=1
              }
            done
            [ $FAILED -eq 0 ] || exit 1

      - name: Commit and push PDFs
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 'Rebuild all LaTeX PDFs'
          file_pattern: 'docs/**/*.pdf'
          branch: main